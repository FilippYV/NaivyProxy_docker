version: "3.9"

services:
  naiveproxy:
    build: .
    container_name: naiveproxy
    restart: unless-stopped

    networks:
      - dokploy-network

    labels:
      - "traefik.enable=true"

      # Роутер
      - "traefik.http.routers.naive.rule=Host(`proxy.agentsystem.life`)"
      - "traefik.http.routers.naive.entrypoints=websecure"
      - "traefik.http.routers.naive.tls=true"

      # Сервис (ВАЖНО: порт внутри контейнера)
      - "traefik.http.services.naive.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true